name: CI

on:
  push:
    branches: ["main", "genspark_ai_developer"]
  pull_request:
    branches: ["main"]
  schedule:
    # Run weekly on Monday 06:00 UTC to catch dependency drift
    - cron: "0 6 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── 1. Unit + Integration tests ───────────────────────────────────────────
  test:
    name: Tests — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run test suite
        env:
          POLYGON_API_KEY: ""
          FINNHUB_API_KEY: "test_key"
          ALPHA_VANTAGE_KEY: "test_key"
          TRADIER_API_KEY: ""
          WHATSAPP_NUMBER: "+10000000000"
          OPENCLAW_API_KEY: "test_key"
          LOG_LEVEL: "WARNING"
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=src --cov=config \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=60

      - name: Upload coverage (Python 3.12 only)
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.12'
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

  # ─── 2. Lint / Style ───────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        # E/W = pycodestyle, F = pyflakes — E501 (line-length) advisory only
        run: ruff check src/ tests/ config/ scripts/ --select=E,W,F --ignore=E501,W503
        continue-on-error: true   # Advisory — never blocks merges

  # ─── 3. Dry-run smoke test ─────────────────────────────────────────────────
  dry_run:
    name: Dry-run pipeline smoke test
    runs-on: ubuntu-latest
    needs: test   # only run after tests pass

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Nightly scan dry-run
        env:
          POLYGON_API_KEY: ""
          FINNHUB_API_KEY: "test_key"
          LOG_LEVEL: "WARNING"
        run: python -m src.pipeline.nightly_scan --dry-run

      - name: Morning brief dry-run
        env:
          POLYGON_API_KEY: ""
          FINNHUB_API_KEY: "test_key"
          LOG_LEVEL: "WARNING"
        run: python -m src.pipeline.morning_brief

  # ─── 4. Security audit ─────────────────────────────────────────────────────
  security:
    name: Security audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: pip-audit -r requirements.txt --ignore-vuln GHSA-r9hx-vwmv-q579
        continue-on-error: true   # Advisory — reports but does not fail the build
